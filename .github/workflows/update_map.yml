name: Update Daily Map
on:
  schedule:
    - cron: '0 2 * * *' # Runs at 2:00 AM daily
  workflow_dispatch: # Allows you to click "Run" manually

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Map Script
        run: python scripts/build_map.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'MapBot'
          git config --global user.email 'bot@github.com'
          git add index.html
          git commit -m "Automated map update" || exit 0
          git push
